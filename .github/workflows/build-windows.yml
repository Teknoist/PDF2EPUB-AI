name: Build Windows

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[ocr,gui,package]"
      - run: python -m PyInstaller --noconfirm --clean pdf2epub-ai.spec
      - uses: actions/upload-artifact@v4
        with:
          name: PDF2EPUB-AI-Windows
          path: dist/PDF2EPUB-AI
